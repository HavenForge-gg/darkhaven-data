id: murakamis_puzzle_box
type: item
name: Murakami's Puzzle Box
category: special
rarity: Legendary Puzzle Box
description: >
  This intricately painted box appears to be an artifact from the Orient.
  Use it to transmute, upgrade, and salvage items by placing ingredients
  into the box to perform recipes involving runes, gems, and socketed equipment.
image: /images/items/accessories/misc/Puzzle_Box.png

recipes:

  # ---------------------------------------------------------------------------
  # Rune Recipes
  # ---------------------------------------------------------------------------

  - id: upgrade_rune
    name: Upgrade Rune
    description: >
      Upgrades a rune to the next tier.
    input:
      - 1x Rune
      - 2x Flawed Gem (any type)
    output: 1x Next Tier Rune
    notes: Ash is the highest tier and cannot be upgraded.

  - id: downgrade_rune
    name: Downgrade Rune
    description: >
      Downgrades a rune to the previous tier.
    input:
      - 1x Rune
      - 2x Cracked Gem (any type)
    output: 1x Previous Tier Rune

  # ---------------------------------------------------------------------------
  # Socket Recipes
  # ---------------------------------------------------------------------------

  - id: add_socket
    name: Add Socket
    description: >
      Adds a socket to an item that currently has no sockets.
    input:
      - 1x Item (no sockets)
      - 1x Elm Rune
    output: Item with 1 socket

  - id: destructive_unsocket
    name: Destructive Unsocket
    description: >
      Removes all socketed gems or runes but destroys the item.
    input:
      - 1x Socketed Item
      - 1x Cracked Gem (any type)
    output: All socketed gems or runes returned
    notes: The item is destroyed.

  - id: preservative_unsocket
    name: Preservative Unsocket
    description: >
      Removes all socketed gems or runes while preserving the item.
    input:
      - 1x Socketed Item
      - 1x Ash Rune
    output:
      - Original item (empty sockets)
      - All socketed gems or runes returned
    notes: Consumes the Ash rune.

  # ---------------------------------------------------------------------------
  # Gem Recipes
  # ---------------------------------------------------------------------------

  - id: upgrade_gem
    name: Upgrade Gem
    description: >
      Combines three gems of the same type and tier into one gem of the
      next higher tier.
    input: 3x Gem (same type and tier)
    output: 1x Next Tier Gem
    tiers:
      - "3x Cracked -> 1x Flawed"
      - "3x Flawed -> 1x Dull"

  # ---------------------------------------------------------------------------
  # Dye Recipes
  # ---------------------------------------------------------------------------

  - id: reroll_dye
    name: Reroll Dye
    description: >
      Combines two dyes to produce a randomly selected dye.
    input: 2x Item Dye (any type)
    output: 1x Item Dye (random)

  # ---------------------------------------------------------------------------
  # Magic Item Rerolls
  # ---------------------------------------------------------------------------

  - id: reroll_magic_amulet
    name: Reroll Magic Amulet
    description: >
      Rerolls the modifiers on a magic amulet.
    input:
      - 1x Magic Amulet
      - 2x Dull Gem

  - id: reroll_magic_ring_or_flask
    name: Reroll Magic Ring or Flask
    description: >
      Rerolls the modifiers on a magic ring or flask.
    input:
      - 1x Magic Ring or Flask
      - 2x Flawed Gem

  - id: reroll_magic_weapon_or_armor
    name: Reroll Magic Weapon or Armor
    description: >
      Rerolls the modifiers on a magic weapon or armor piece.
    input:
      - 1x Magic Weapon or Armor
      - 3x Cracked Gem

  # ---------------------------------------------------------------------------
  # Rare Item Rerolls
  # ---------------------------------------------------------------------------

  - id: reroll_rare_amulet
    name: Reroll Rare Amulet
    description: >
      Rerolls the modifiers on a rare amulet.
    input:
      - 1x Rare Amulet
      - 1x Bat Rune
      - 1x Dull Gem

  - id: reroll_rare_ring_or_flask
    name: Reroll Rare Ring or Flask
    description: >
      Rerolls the modifiers on a rare ring or flask.
    input:
      - 1x Rare Ring or Flask
      - 1x Bat Rune
      - 1x Flawed Gem

  - id: reroll_rare_weapon_or_armor
    name: Reroll Rare Weapon or Armor
    description: >
      Rerolls the modifiers on a rare weapon or armor piece.
    input:
      - 1x Rare Weapon or Armor
      - 1x Bat Rune
      - 2x Cracked Gem

  # ---------------------------------------------------------------------------
  # Imbue Recipes
  # ---------------------------------------------------------------------------

  - id: fire_imbue
    name: Fire Imbue
    description: >
      Imbues a common item with fire power.
      Requires a fire-aligned monster heart and a cracked ruby.
    input:
      - 1x Common Item (with at least one empty socket)
      - 1x Fire Heart (Bogie Feral / Skeleton Mage [Fire] / Ember Ghoul)
      - 1x Cracked Ruby
    output: Fire-imbued item

