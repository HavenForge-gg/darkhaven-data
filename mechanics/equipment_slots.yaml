id: equipment_slots
type: mechanic
name: Equipment Slots
description: >
  Defines all equipment slots available on a character. Each slot can hold
  specific types of equipment. Items are stored in the Hero Equipment
  Container using sequential integer indices (0-27).

alt_slot_exclusion: >
  Any stat on items in slots 11 or 12 is NOT counted toward character totals.
  This applies to: attributes, penetration, crit chance, attack speed,
  cast speed, mana bonuses, and skill level bonuses. Only the active weapon
  set (slots 0-10) contributes to all calculations.

